<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page Not Found | Checkmark Audio</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #f6f1ea;
        background: #050505;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      main {
        width: min(640px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 8vw, 5rem);
        font-weight: 300;
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: #b8ada2;
        font-size: 1.05rem;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border: 1px solid #d83f2f;
        color: #fff;
        background: #d83f2f;
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>This page may have moved during the Checkmark Audio site rebuild.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
