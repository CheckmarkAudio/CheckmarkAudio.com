<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Classroom Studio Surfaces" subtitle="Default mode — warm paper, white cards, gold signal" viewport="700x250" -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 24px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cell { border-radius: 12px; overflow:hidden; border:1px solid var(--border-strong); }
  .sw { height: 72px; }
  .lbl { padding:8px 10px; background: var(--surface); }
  .name { font: var(--text-label); letter-spacing: var(--tracking-label); text-transform:uppercase; color: var(--fg); }
  .hex { font: var(--text-mono); color: var(--fg-light); display:block; margin-top:2px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .tag { font: var(--text-label); letter-spacing: var(--tracking-label); text-transform:uppercase; color: var(--gold-dim); }
  .sub { font: var(--text-caption); color: var(--fg-light); }
  .txtrow { display:flex; gap:18px; margin-top:16px; align-items:baseline; }
  .txtrow span { font-size:15px; }
</style>
</head>
<body>
  <div class="row"><span class="tag">Classroom Studio — Default Mode</span><span class="sub">student app · handouts · workbooks · reading</span></div>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:var(--bg)"></div><div class="lbl"><span class="name">bg</span><span class="hex">#FFFAF0</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--surface)"></div><div class="lbl"><span class="name">surface</span><span class="hex">#FFFFFF</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--surface-alt)"></div><div class="lbl"><span class="name">surface-alt</span><span class="hex">#F7F2E8</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--gold)"></div><div class="lbl"><span class="name">gold</span><span class="hex">#C9A84C</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--ink); display:flex;align-items:center;justify-content:center"><span style="color:var(--gold);font-size:24px">✓</span></div><div class="lbl"><span class="name">ink + gold</span><span class="hex">#111114</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--border)"></div><div class="lbl"><span class="name">border</span><span class="hex">#E7DCC8</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--border-strong)"></div><div class="lbl"><span class="name">border-strong</span><span class="hex">#CDBF9F</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--fg)"></div><div class="lbl"><span class="name">fg</span><span class="hex">#141416</span></div></div>
  </div>
  <div class="txtrow">
    <span style="color:var(--fg)">fg — primary</span>
    <span style="color:var(--fg-muted)">fg-muted — secondary</span>
    <span style="color:var(--fg-light)">fg-light — meta</span>
  </div>
</body>
</html>
