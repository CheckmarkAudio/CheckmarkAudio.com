<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Primary Logo" subtitle="Book + headphones — white / gold / black" viewport="700x220" -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 24px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .tag { font: var(--text-label); letter-spacing: var(--tracking-label); text-transform:uppercase; color: var(--gold); }
  .sub { font: var(--text-caption); color: var(--fg-light); }
  .grid { display:grid; grid-template-columns: repeat(3,1fr); gap:14px; }
  .panel { border-radius:16px; border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:22px; gap:12px; height:150px; }
  .panel img { height:78px; width:auto; }
  .cap { font:var(--text-label); letter-spacing:var(--tracking-label); text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row"><span class="tag">Primary Logo — Book + Headphones</span><span class="sub">the school mark · "learn by listening"</span></div>
  <div class="grid">
    <div class="panel" style="background:var(--ink)"><img src="../assets/03-school-logo-white.png" alt="white" /><span class="cap" style="color:var(--fg-light)">White · on ink</span></div>
    <div class="panel" style="background:var(--surface)"><img src="../assets/02-school-logo-gold.png" alt="gold" /><span class="cap" style="color:var(--gold)">Gold · on charcoal</span></div>
    <div class="panel" style="background:#ffffff"><img src="../assets/01-school-logo-black.png" alt="black" /><span class="cap" style="color:#15151b">Black · on white</span></div>
  </div>
</body>
</html>
