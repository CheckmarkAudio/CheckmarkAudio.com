<!DOCTYPE html>
<!-- @dsCard group="Type" name="Mono Readouts" subtitle="Tabular technical values — dB / LUFS / Hz / ms" viewport="700x170" -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 24px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .tag { font: var(--text-label); letter-spacing: var(--tracking-label); text-transform:uppercase; color: var(--gold); }
  .sub { font: var(--text-caption); color: var(--fg-light); }
  .grid { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
  .read { border-radius:12px; border:1px solid var(--border); background:var(--surface); padding:14px; }
  .val { font:600 26px/1 var(--font-mono); color:var(--gold); font-feature-settings:"tnum" 1; }
  .lab { font:var(--text-label); letter-spacing:var(--tracking-label); text-transform:uppercase; color:var(--fg-light); margin-top:8px; }
  .meter { height:6px; border-radius:999px; background:var(--surface-alt); margin-top:10px; overflow:hidden; }
  .meter i { display:block; height:100%; background:linear-gradient(90deg,var(--success),var(--warning)); }
</style>
</head>
<body>
  <div class="row"><span class="tag">Mono in Use — Technical Readouts</span><span class="sub">tabular numerals · the engineering values students work in</span></div>
  <div class="grid">
    <div class="read"><div class="val">−14.0</div><div class="lab">Integrated LUFS</div><div class="meter"><i style="width:72%"></i></div></div>
    <div class="read"><div class="val">2.4k</div><div class="lab">EQ Center · Hz</div><div class="meter"><i style="width:48%"></i></div></div>
    <div class="read"><div class="val">−3.2</div><div class="lab">True Peak · dBTP</div><div class="meter"><i style="width:88%"></i></div></div>
    <div class="read"><div class="val">120</div><div class="lab">Attack · ms</div><div class="meter"><i style="width:34%"></i></div></div>
  </div>
</body>
</html>
