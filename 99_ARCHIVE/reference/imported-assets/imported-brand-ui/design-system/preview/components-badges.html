<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & Chips" subtitle="Status, tags, module chips" viewport="700x260" -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 24px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .tag { font: var(--text-label); letter-spacing: var(--tracking-label); text-transform:uppercase; color: var(--gold-dim); }
  .sub { font: var(--text-caption); color: var(--fg-light); }
  .pills { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  /* Solid light tint + deep saturated text — high contrast, fully legible */
  .pill { display:inline-flex; align-items:center; gap:7px; border-radius:999px; padding:6px 13px; font:700 12.5px/1 var(--font-sans); white-space:nowrap; }
  .dot { width:7px;height:7px;border-radius:50%; }
  .lbl { font:var(--text-label); letter-spacing:var(--tracking-label); text-transform:uppercase; color:var(--fg-light); margin:0 0 8px; }

  .neutral { background:#e9e9ee; color:#3f3f48; box-shadow:inset 0 0 0 1px #c9c9d2; }
  .success { background:#cdebd9; color:#0f6b43; }
  .warning { background:#f6dba0; color:#8a5212; }   /* Needs Revision — deep amber on warm tint */
  .gold    { background:#f0e0b4; color:#7a5e1c; }
  .accent  { background:#e6ddfb; color:#5b21b6; }
  .m1 { background:#d4e4fb; color:#1d4ed8; }
  .m2 { background:#cdeef2; color:#0e7490; }
  .m3 { background:#f6e2bd; color:#a15c0a; }
</style>
</head>
<body>
  <div class="row"><span class="tag">Badges &amp; Chips</span><span class="sub">status, level &amp; module tags</span></div>
  <p class="lbl">Status</p>
  <div class="pills">
    <span class="pill success"><span class="dot" style="background:#0f6b43"></span>Passed</span>
    <span class="pill warning"><span class="dot" style="background:#8a5212"></span>Needs Revision</span>
    <span class="pill gold"><span class="dot" style="background:#7a5e1c"></span>In Progress</span>
    <span class="pill neutral"><span class="dot" style="background:#7a7a85"></span>Not Started</span>
  </div>
  <p class="lbl">Tags</p>
  <div class="pills">
    <span class="pill accent">★ Key Concept</span>
    <span class="pill gold">Skills Check</span>
    <span class="pill neutral">Hands-On</span>
    <span class="pill neutral">Listening</span>
    <span class="pill neutral">4-hour class</span>
  </div>
  <p class="lbl">Module</p>
  <div class="pills">
    <span class="pill m1">Module 01</span>
    <span class="pill m2">Module 02</span>
    <span class="pill m3">Module 03</span>
  </div>
</body>
</html>
